services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - CORS_ORIGIN=${FRONTEND_URL:-http://localhost:3000}
      - MEAN_IAT_SEC=7
      - MEAN_SVC_SEC=5

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NGROK_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
